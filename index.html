<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Art Studio: Pro Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎨 AI Art Studio: Pro Edition</h1>

        <!-- LEFT COLUMN: CONTROLS -->
        <div class="panel">
            <h3>🎛️ Engine Configurations</h3>

            <div class="control-group">
                <label>1. Base (Content) Image</label>
                <input type="file" id="content-input" accept="image/*">
            </div>

            <div class="control-group">
                <label>2. Style Reference Image</label>
                <input type="file" id="style-input" accept="image/*">
            </div>

            <div class="control-group">
                <label>3. Target Model (Single Mode)</label>
                <select id="model-choice">
                    <option value="sd_15">Stable Diffusion v1.5 (Standard)</option>
                    <option value="dreamshaper">DreamShaper v8 (Artistic)</option>
                </select>
            </div>

            <!-- FEATURE 4: STRUCTURAL CONDITIONING LOCKS -->
            <div class="control-group">
                <label>4. Structural Lock Filter</label>
                <select id="structure-lock">
                    <option value="none">None (Free Morphing)</option>
                    <option value="canny">Canny Edge (Strict Contours)</option>
                    <option value="depth">Depth Map (Spatial 3D Geometry)</option>
                </select>
            </div>

            <div class="control-group">
                <div class="slider-header">
                    <label>Style Influence</label>
                    <div class="value-display" id="style-scale-val">0.75</div>
                </div>
                <input type="range" id="style-scale" min="0.0" max="1.5" step="0.05" value="0.75">
            </div>

            <div class="control-group">
                <div class="slider-header">
                    <label>Structural Mutation (Strength)</label>
                    <div class="value-display" id="strength-val">0.60</div>
                </div>
                <input type="range" id="strength" min="0.1" max="0.9" step="0.05" value="0.60">
            </div>

            <div class="control-group">
                <div class="slider-header">
                    <label>Inference Steps</label>
                    <div class="value-display" id="steps-val">30</div>
                </div>
                <input type="range" id="steps" min="10" max="50" step="5" value="30">
            </div>

            <!-- FEATURE 3: HI-RES UPSCALER PIPELINE TOGGLE -->
            <div class="control-group switch-group">
                <label for="hd-upscale" class="switch-label">✨ Super-Resolution HD Upscale</label>
                <input type="checkbox" id="hd-upscale" class="ios-switch">
            </div>

            <button id="submit-btn">🚀 Generate Masterpiece</button>
            <button id="compare-btn">⚔️ Compare Two AI Models</button>
        </div>

        <!-- RIGHT COLUMN: MASTER PREVIEW VIEWPORT -->
        <div class="panel" id="result-viewport">
            <div class="loader" id="loader"></div>

            <p id="placeholder-text">
                System idle. Awaiting configuration upload to materialize artwork assets.
            </p>

            <img id="output-image" alt="Stylized Output">

            <div id="comparison-labels">
                <span>Model 1: SD 1.5</span>
                <span>Model 2: DreamShaper</span>
            </div>

            <img id="comparison-image" alt="Comparison Output">

            <button id="download-btn" style="display: none;">📥 Download Output PNG</button>
        </div>

        <!-- FEATURE 1: CORE VISUAL SESSION HISTORY GRID -->
        <div class="panel full-width-gallery">
            <h3>📂 Active Session Matrix Gallery</h3>
            <div id="history-grid" class="history-grid">
                <!-- JavaScript appends dynamic thumbnails here in runtime -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
